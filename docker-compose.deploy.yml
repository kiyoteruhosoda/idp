# デプロイ先（ソースを持たない別ホスト）用の Compose。build: を持たず、ビルド済みイメージを image: 参照で
# 起動する。イメージは別ホストの scripts/build.sh が tar（dist/ バンドル）で出力し、バンドル内では本ファイルが
# docker-compose.yml として同梱される。開発・ビルド用（build: を持つ）はリポジトリの docker-compose.yml。
#   イメージ名: ${IMAGE_PREFIX:-idp}/{api,web,migrate}:${IMAGE_TAG:-latest}
#   deploy.sh（初回・更新・reset の単一入口）が使う。手で -f 指定する必要はない。
services:
  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-idp}
      MARIADB_USER: ${MARIADB_USER:-idp}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?set MARIADB_ROOT_PASSWORD in .env}
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    mem_limit: 768m
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 120s

  api:
    image: ${IMAGE_PREFIX:-idp}/api:${IMAGE_TAG:-latest}
    environment:
      ISSUER: ${ISSUER:-http://localhost:8080}
      BIND_ADDR: 0.0.0.0:8080
      DATABASE_URL: mysql://${MARIADB_USER:-idp}:${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}@mariadb:3306/${MARIADB_DATABASE:-idp}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      RUST_LOG: ${RUST_LOG:-info,idp=info}
      KEY_ENCRYPTION_KEY: ${KEY_ENCRYPTION_KEY:?set KEY_ENCRYPTION_KEY in .env}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      AUTH_SESSION_TTL_SECS: ${AUTH_SESSION_TTL_SECS:-}
      AUTHORIZATION_CODE_TTL_SECS: ${AUTHORIZATION_CODE_TTL_SECS:-}
      SSO_IDLE_TTL_SECS: ${SSO_IDLE_TTL_SECS:-}
      SSO_ABSOLUTE_TTL_SECS: ${SSO_ABSOLUTE_TTL_SECS:-}
      ACCESS_TOKEN_TTL_SECS: ${ACCESS_TOKEN_TTL_SECS:-}
      ID_TOKEN_TTL_SECS: ${ID_TOKEN_TTL_SECS:-}
      REFRESH_TOKEN_TTL_SECS: ${REFRESH_TOKEN_TTL_SECS:-}
      CLOCK_SKEW_SECS: ${CLOCK_SKEW_SECS:-}
      INVITATION_TTL_SECS: ${INVITATION_TTL_SECS:-}
      PASSWORD_RESET_TTL_SECS: ${PASSWORD_RESET_TTL_SECS:-}
      EMAIL_VERIFICATION_TTL_SECS: ${EMAIL_VERIFICATION_TTL_SECS:-}
      TENANT_CACHE_TTL_SECS: ${TENANT_CACHE_TTL_SECS:-}
      PERMISSION_CACHE_TTL_SECS: ${PERMISSION_CACHE_TTL_SECS:-}
      KEY_ROTATION_LEAD_DAYS: ${KEY_ROTATION_LEAD_DAYS:-}
      TRUST_FORWARDED_HEADERS: ${TRUST_FORWARDED_HEADERS:-}
      HSTS_MAX_AGE: ${HSTS_MAX_AGE:-}
      CSRF_SECRET: ${CSRF_SECRET:-}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-}
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 256
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  web:
    image: ${IMAGE_PREFIX:-idp}/web:${IMAGE_TAG:-latest}
    environment:
      WEB_BIND_ADDR: 0.0.0.0:8081
      API_BASE_URL: http://api:8080
      ISSUER: ${ISSUER:-http://localhost:8080}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      RUST_LOG: ${RUST_LOG:-info,idp_web=info}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      CSRF_SECRET: ${CSRF_SECRET:-}
      HSTS_MAX_AGE: ${HSTS_MAX_AGE:-}
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 256
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped
    mem_limit: 128m
    pids_limit: 128
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

  # DDL・マスタデータ適用の専用ワンショットジョブ（ビルド済みイメージ）。常駐させない。
  migrate:
    image: ${IMAGE_PREFIX:-idp}/migrate:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: mysql://${MARIADB_USER:-idp}:${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}@mariadb:3306/${MARIADB_DATABASE:-idp}
    depends_on:
      mariadb:
        condition: service_healthy
    profiles: ["tools"]

volumes:
  mariadb_data:
