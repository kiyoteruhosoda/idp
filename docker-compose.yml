# 開発・ビルド用の Compose（ソースがあるホスト向け。api/web/migrate は build: でソースからビルドする）。
# ソースを持たないデプロイ先では、代わりにビルド済みイメージを image: 参照する docker-compose.deploy.yml を
# 使う（scripts/init.sh・deploy.sh がそちらを使用）。イメージの受け渡しは scripts/README.md「ホストの分離」参照。
services:
  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-idp}
      MARIADB_USER: ${MARIADB_USER:-idp}
      # 秘密情報は .env で一元管理する（.env.example を参照。scripts/init.sh が生成）。
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?set MARIADB_ROOT_PASSWORD in .env}
    ports:
      - "${MARIADB_BIND_HOST:-127.0.0.1}:${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    mem_limit: 768m
    cpus: "1.0"
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  # api サービス（ADR-0007）。OIDC protocol・JSON 管理 API・内部 API。DB へ直結する唯一のサービス。
  # マイグレーション適用は行わず、起動時に version 照合のみ（fail-fast）。DDL 適用は migrate ジョブ。
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-api
    environment:
      ISSUER: ${ISSUER:-http://localhost:8080}
      BIND_ADDR: 0.0.0.0:8080
      # サービス名 mariadb で解決する（Compose ネットワーク内）。
      DATABASE_URL: mysql://${MARIADB_USER:-idp}:${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}@mariadb:3306/${MARIADB_DATABASE:-idp}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      RUST_LOG: ${RUST_LOG:-info,idp=info}
      KEY_ENCRYPTION_KEY: ${KEY_ENCRYPTION_KEY:?set KEY_ENCRYPTION_KEY in .env}
      # web→api の /internal/* を保護する共有シークレット（ADR-0007 §5。web と同値）。
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN in .env}
      # 未指定（空）なら issuer のスキームから自動判定（https で有効）。
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      AUTH_SESSION_TTL_SECS: ${AUTH_SESSION_TTL_SECS:-}
      AUTHORIZATION_CODE_TTL_SECS: ${AUTHORIZATION_CODE_TTL_SECS:-}
      SSO_IDLE_TTL_SECS: ${SSO_IDLE_TTL_SECS:-}
      SSO_ABSOLUTE_TTL_SECS: ${SSO_ABSOLUTE_TTL_SECS:-}
      ACCESS_TOKEN_TTL_SECS: ${ACCESS_TOKEN_TTL_SECS:-}
      ID_TOKEN_TTL_SECS: ${ID_TOKEN_TTL_SECS:-}
      REFRESH_TOKEN_TTL_SECS: ${REFRESH_TOKEN_TTL_SECS:-}
      CLOCK_SKEW_SECS: ${CLOCK_SKEW_SECS:-}
      INVITATION_TTL_SECS: ${INVITATION_TTL_SECS:-}
      PASSWORD_RESET_TTL_SECS: ${PASSWORD_RESET_TTL_SECS:-}
      EMAIL_VERIFICATION_TTL_SECS: ${EMAIL_VERIFICATION_TTL_SECS:-}
      TENANT_CACHE_TTL_SECS: ${TENANT_CACHE_TTL_SECS:-}
      PERMISSION_CACHE_TTL_SECS: ${PERMISSION_CACHE_TTL_SECS:-}
      KEY_ROTATION_LEAD_DAYS: ${KEY_ROTATION_LEAD_DAYS:-}
      TRUST_FORWARDED_HEADERS: ${TRUST_FORWARDED_HEADERS:-}
      HSTS_MAX_AGE: ${HSTS_MAX_AGE:-}
      CSRF_SECRET: ${CSRF_SECRET:-}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-}
    # 既定では外部公開しない（プロキシ経由でのみ到達）。デバッグ時は下記を有効化する。
    # ports:
    #   - "8080:8080"
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 256
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # web サービス（ADR-0007）。HTML 画面（ログイン・管理コンソール）と API クライアント。DB 非依存。
  # データ操作は api へ HTTP 越しに行う（sqlx を持たない）。
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-web
    environment:
      WEB_BIND_ADDR: 0.0.0.0:8081
      # サーバ側から api へ直結する（Compose ネットワーク内。プロキシは通さない）。
      API_BASE_URL: http://api:8080
      ISSUER: ${ISSUER:-http://localhost:8080}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      RUST_LOG: ${RUST_LOG:-info,idp_web=info}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      CSRF_SECRET: ${CSRF_SECRET:-}
      HSTS_MAX_AGE: ${HSTS_MAX_AGE:-}
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 256
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # リバースプロキシ（ADR-0007 §2）。単一オリジンでブラウザのトラフィックをパスで web/api へ振り分ける。
  # /login・/admin/console/* → web、/internal/* は遮断、それ以外 → api。
  proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    pids_limit: 128
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

  # DDL・マスタデータ適用の専用ワンショットジョブ。常駐させないため profiles で通常起動から除外し、
  # `docker compose run --rm migrate` で単独実行する（scripts/init.sh・deploy.sh が使用）。
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: mysql://${MARIADB_USER:-idp}:${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}@mariadb:3306/${MARIADB_DATABASE:-idp}
    depends_on:
      mariadb:
        condition: service_healthy
    profiles: ["tools"]

  # セッションストアは MVP では MariaDB 単独で完結させる。Redis はスケール時に有効化する。
  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    profiles: ["optional"]

volumes:
  mariadb_data:
