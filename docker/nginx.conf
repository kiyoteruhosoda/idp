# 単一オリジン・パスルーティング（ADR-0007 §2）。ブラウザは 1 オリジン（プロキシ）に来て、
# パスで web / api へ振り分ける。SSO Cookie は 1 ドメインで両サービスに届く。
#
# - /login・/admin/console/*  → web（HTML 画面）
# - /internal/*               → 外部遮断（404。web→api の内部呼び出しはプロキシを通さず直結）
# - それ以外                  → api（OIDC protocol・JSON 管理 API・health・OpenAPI）
#
# web はサーバ側では api へ直結（API_BASE_URL=http://api:8080）するため、このプロキシは
# ブラウザ向けトラフィックのみを扱う。X-Forwarded-* を付与し、api/web は接続元 IP・スキームを解釈する。

worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /dev/stdout;
    error_log  /dev/stderr;

    upstream api { server api:8080; }
    upstream web { server web:8081; }

    server {
        listen 8080;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # 内部 API はプロキシ経由では到達させない（多層防御。web→api は Compose ネットワーク内で直結）。
        location /internal/ { return 404; }

        # HTML 画面は web へ。
        location = /login { proxy_pass http://web; }
        location /admin/console/ { proxy_pass http://web; }

        # それ以外（/authorize・/token・/userinfo・/.well-known・/admin/*・/healthz・/api/docs 等）は api へ。
        location / { proxy_pass http://api; }
    }
}
