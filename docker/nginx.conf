# 単一オリジン・パスルーティング（ADR-0007 §2・ADR-0009 §6、MT13）。ブラウザは 1 オリジン
# （プロキシ）に来て、パスで web / api へ振り分ける。SSO Cookie は 1 ドメインで両サービスに届く。
#
# MT13 で web の画面 URL がテナント経路化され（`/{tenant_id}/login` 等）、web の管理コンソール
# （HTML）は api の JSON 管理 API と同じ `/{tenant_id}/admin/...` 名前空間を共有する
# （Progress.md MT13・ADR-0009 §6・§10。ブラウザは常に web の HTML コンソールへ、`curl` 等の API
# クライアントは api の JSON へ到達する必要がある）。パスだけでは両者を区別できないため、
# `/{tenant_id}/admin/...` は `Accept` ヘッダで振り分ける
# （ブラウザ画面遷移は `Accept: text/html,...` を送る。JSON を期待する API クライアントは送らない）。
#
# - `/internal/*`                              → 外部遮断（404。web→api の内部呼び出しはプロキシを
#                                                  通さず Compose ネットワーク内で直結）
# - `/{tenant_id}/admin(/...)?`                 → Accept に `text/html` を含むなら web（HTML コンソール）、
#                                                  それ以外は api（JSON 管理 API）
# - `/{tenant_id}/(login|password-change|forgot-password|password-reset|verify-email|settings|consent|mfa/...|account/...|passkey/...)` → web（HTML 画面）
# - `/{tenant_id}/logout`                         → POST は web（ポータル画面のログアウト）、
#                                                  GET は api（OIDC RP-Initiated Logout）
# - `/{tenant_id}/invitations/accept`             → Accept に `text/html` を含むなら web（承諾画面）、
#                                                  それ以外は api（JSON。ログイン済み利用者の直接呼び出し）
# - `/version`                                   → web（ビルドバージョン表示）
# - `/`                                      → web（root テナントの管理ログイン画面へ誘導）
# - `/assets/*`                               → web（共通スタイルシート・React islands 等の同梱済み静的アセット）
# - それ以外（`/{tenant_id}/authorize`・`/token`・`/userinfo`・`/.well-known/*`・`/healthz`・
#   `/api/docs` 等）                            → api（OIDC protocol・health・OpenAPI）
#
# web はサーバ側では api へ直結（API_BASE_URL=http://api:8080）するため、このプロキシは
# ブラウザ向けトラフィックのみを扱う。X-Forwarded-* を付与し、api/web は接続元 IP・スキームを解釈する。

worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /dev/stdout;
    error_log  /dev/stderr;

    upstream api { server api:8080; }
    upstream web { server web:8081; }

    # `/{tenant_id}/admin/...` の振り分け先。ブラウザの HTML 画面遷移（Accept に text/html を含む）
    # のみ web（管理コンソール）へ。curl 等の JSON API クライアントは既定で api へ落ちる。
    map $http_accept $admin_backend {
        default   api;
        "~*text/html" web;
    }

    # `/{tenant_id}/logout` の振り分け先。ポータル画面のログアウト（POST フォーム）は web、
    # OIDC RP-Initiated Logout（GET）は api。
    map $request_method $logout_backend {
        default api;
        POST    web;
    }

    server {
        listen 8080;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # 内部 API はプロキシ経由では到達させない（多層防御。web→api は Compose ネットワーク内で直結）。
        location /internal/ { return 404; }

        # ルートは api へ流すと OIDC/API の未定義パスとして 404 になるため、web 側で root テナントの
        # 管理ログイン画面へ誘導する。root UUID は環境ごとに異なるため web の設定（ROOT_TENANT_ID）で解決する。
        location = / { proxy_pass http://web; }

        # ビルド済み静的アセット（共通スタイルシート /assets/app.css・React islands /assets/react/* 等）。
        # HTML は web が描画し、アセットも同じ境界（web）で配信する。ここで明示しないと catch-all が api へ
        # 流し、/assets/app.css や /assets/react/app.js が 404 になる。
        location /assets/ { proxy_pass http://web; }

        # テナント UUID プレフィクスの管理コンソール／JSON 管理 API（web/api で名前空間を共有）。
        # Accept ヘッダで振り分ける（コメント参照）。
        location ~ "^/[0-9a-fA-F-]{36}/admin(/.*)?$" {
            proxy_pass http://$admin_backend;
        }

        # テナント UUID プレフィクスの HTML 画面（管理コンソールを除く）は web へ。
        # `settings`（プロフィール設定）・パスワードリセット・メール検証も web の画面。
        location ~ "^/[0-9a-fA-F-]{36}/(login|password-change|forgot-password|password-reset|verify-email|settings|consent|mfa/|account/|passkey/)" {
            proxy_pass http://web;
        }

        # `/logout` は web（ポータル画面のログアウト。POST）と api（OIDC RP-Initiated Logout。GET）が
        # 同じパスを共有する。メソッドで振り分ける。
        location ~ "^/[0-9a-fA-F-]{36}/logout$" {
            proxy_pass http://$logout_backend;
        }

        # 招待承諾は HTML 画面（web）と JSON API（api）が同じパスを共有する。Accept で振り分ける。
        location ~ "^/[0-9a-fA-F-]{36}/invitations/accept$" {
            proxy_pass http://$admin_backend;
        }

        # ビルドバージョン表示（web のフッタからリンクされる）。
        location = /version { proxy_pass http://web; }

        # それ以外（OIDC protocol・health・OpenAPI 等）は api へ。
        location / { proxy_pass http://api; }
    }
}
