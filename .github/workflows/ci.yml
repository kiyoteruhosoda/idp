name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_DATABASE: idp
          MARIADB_USER: idp
          MARIADB_PASSWORD: idp
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
    env:
      DATABASE_URL: mysql://idp:idp@127.0.0.1:3306/idp
      TEST_DATABASE_URL: mysql://idp:idp@127.0.0.1:3306/idp
      INTERNAL_SERVICE_TOKEN: ci-internal-service-token
      KEY_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      CSRF_SECRET: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      MARIADB_PASSWORD: idp
      MARIADB_ROOT_PASSWORD: root
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Unit and DB integration tests
        run: cargo test --workspace --locked
      - name: Shell deployment tests
        run: ./scripts/test_deploy.sh
      - name: Remote build/deploy script tests
        run: ./scripts/test_build_remote.sh
      - name: E2E
        run: ./scripts/e2e.sh
      - name: Docker build and deploy bundle
        run: ./scripts/build.sh
      - name: Compose config
        run: |
          docker compose -f docker-compose.yml config >/tmp/compose.yml
          docker compose -f docker-compose.deploy.yml config >/tmp/compose.deploy.yml
