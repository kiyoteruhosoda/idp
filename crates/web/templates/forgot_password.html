<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="/assets/app.css"><title>{{ messages.get("forgot-password-title") }}</title></head>
<body>
<h1>{{ messages.get("forgot-password-title") }}</h1>
{% if accepted %}
<p>{{ messages.get("forgot-password-accepted") }}</p>
{% else %}
<p>{{ messages.get("forgot-password-intro") }}</p>
{% if let Some(key) = error_key %}<p class="error" role="alert">{{ messages.get(key) }}</p>{% endif %}
<form method="post" action="">
<label>{{ messages.get("forgot-password-email") }} <input type="email" name="email" autocomplete="email" required maxlength="320"></label>
<button type="submit">{{ messages.get("forgot-password-submit") }}</button>
</form>
{% endif %}
{% include "react_bootstrap.html" %}
</body>
</html>
