<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>{{ messages.get("password-change-title") }}</title></head>
<body>
<h1>{{ messages.get("password-change-title") }}</h1>
<p>{{ messages.get("password-change-forced-intro") }}</p>
{% if let Some(key) = error_key %}<p class="error" role="alert">{{ messages.get(key) }}</p>{% endif %}
<form method="post" action="">
<input type="hidden" name="csrf_token" value="{{ csrf }}">
<label>{{ messages.get("password-change-current-label") }} <input type="password" name="current_password" autocomplete="current-password" required></label>
<label>{{ messages.get("password-change-new-label") }} <input type="password" name="new_password" autocomplete="new-password" required minlength="8"></label>
<label>{{ messages.get("password-change-confirm-label") }} <input type="password" name="new_password_confirm" autocomplete="new-password" required minlength="8"></label>
<button type="submit">{{ messages.get("password-change-submit") }}</button>
</form>
{% include "react_bootstrap.html" %}
</body>
</html>
