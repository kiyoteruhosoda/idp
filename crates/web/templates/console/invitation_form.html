{% extends "console/layout.html" %}
{% block content %}
<h2 class="h4 mb-1">{{ messages.get("admin-invitations-title") }}</h2>
<p class="text-muted">{{ messages.get("admin-invitations-intro") }}</p>
{% if let Some(err) = error %}<div class="alert alert-danger" role="alert">{{ err }}</div>{% endif %}
<div class="card">
  <div class="card-body">
    <form method="post" action="{{ tenant }}/admin/invitations">
      <input type="hidden" name="csrf_token" value="{{ csrf }}">
      <div class="mb-3">
        <label class="form-label" for="invitation-user-id">{{ messages.get("admin-invitations-field-user-id") }}</label>
        <input type="text" class="form-control" id="invitation-user-id" name="user_id" value="{{ user_id }}" required>
      </div>
      <div class="d-flex align-items-center gap-2">
        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane me-2" aria-hidden="true"></i>{{ messages.get("admin-invitations-submit") }}</button>
        <a class="btn btn-outline-secondary" href="{{ tenant }}/admin/members">{{ messages.get("admin-form-cancel") }}</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
