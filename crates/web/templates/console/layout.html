<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="/assets/app.css"><title>{{ messages.get("admin-console-title") }}</title></head>
<body>
{% if let Some(uid) = admin %}
<header class="admin-header">
<a class="admin-title" href="{{ tenant }}/admin">{{ messages.get("admin-console-title") }}</a>
<a class="admin-profile" href="{{ tenant }}/settings" aria-label="{{ messages.get("admin-profile-settings") }}">
<span class="admin-profile__icon" aria-hidden="true">👤</span>
<span class="admin-profile__body"><span class="admin-profile__label">{{ messages.get("admin-signed-in-as") }}</span><span class="admin-profile__name">{{ uid }}</span></span>
</a>
<form method="post" action="{{ tenant }}/admin/logout" class="admin-logout"><button type="submit">{{ messages.get("admin-logout") }}</button></form>
</header>
{% else %}
<header class="admin-header"><a class="admin-title" href="{{ tenant }}/admin">{{ messages.get("admin-console-title") }}</a></header>
{% endif %}
<main>
{% block content %}{% endblock %}
</main>
{% include "footer.html" %}
{% include "react_bootstrap.html" %}
</body>
</html>
