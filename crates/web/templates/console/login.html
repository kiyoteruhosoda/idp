{% extends "page.html" %}
{% block title %}{{ messages.get("admin-login-title") }}{% endblock %}
{% block content %}
<div class="card border-0 bg-transparent">
  <div class="card-header text-center py-3 border-0 bg-transparent">
    <h1 class="h4 mb-0">{{ messages.get("admin-login-title") }}</h1>
  </div>
  <div class="card-body p-4">
    {% if let Some(key) = error_key %}<div class="alert alert-warning" role="alert">{{ messages.get(key) }}</div>{% endif %}
    <form method="post" action="">
      <input type="hidden" name="csrf_token" value="{{ csrf }}">
      <div class="mb-3">
        <label class="form-label" for="admin-login-email">{{ messages.get("login-email") }}</label>
        <input type="email" class="form-control" id="admin-login-email" name="email" autocomplete="email" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label" for="admin-login-password">{{ messages.get("login-password") }}</label>
        <input type="password" class="form-control" id="admin-login-password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">{{ messages.get("login-submit") }}</button>
    </form>
  </div>
</div>
{% include "password_visibility.html" %}
{% endblock %}
