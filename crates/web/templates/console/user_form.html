{% extends "console/layout.html" %}
{% block content %}
<h2 class="h4 mb-3">{{ messages.get("admin-users-new-title") }}</h2>
{% if let Some(err) = error %}<div class="alert alert-danger" role="alert">{{ err }}</div>{% endif %}
<div class="card">
  <div class="card-body">
    <form method="post" action="{{ tenant }}/admin/users/new">
      <input type="hidden" name="csrf_token" value="{{ csrf }}">
      <div class="mb-3">
        <label class="form-label" for="user-email">{{ messages.get("admin-user-col-email") }}</label>
        <input type="email" class="form-control" id="user-email" name="email" value="{{ email }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="user-preferred-username">{{ messages.get("admin-user-col-username") }}</label>
        <input type="text" class="form-control" id="user-preferred-username" name="preferred_username" value="{{ preferred_username }}">
      </div>
      <div class="mb-3">
        <label class="form-label" for="user-name">{{ messages.get("admin-users-field-name") }}</label>
        <input type="text" class="form-control" id="user-name" name="name" value="{{ name }}">
      </div>
      <div class="d-flex align-items-center gap-2">
        <button type="submit" class="btn btn-primary">{{ messages.get("admin-form-save") }}</button>
        <a class="btn btn-outline-secondary" href="{{ tenant }}/admin/users">{{ messages.get("admin-form-cancel") }}</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
