<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>{{ messages.get("consent-title") }}</title></head>
<body>
<h1>{{ messages.get("consent-title") }}</h1>
<p>{{ messages.get("consent-intro") }} <strong>{{ client_name }}</strong></p>
{% if !requested_scopes.is_empty() %}
<ul>
{% for scope in requested_scopes %}
<li>{{ messages.get(&format!("consent-scope-{scope}")) }}</li>
{% endfor %}
</ul>
{% endif %}
<form method="post" action="">
<input type="hidden" name="csrf_token" value="{{ csrf }}">
<input type="hidden" name="auth_session_id" value="{{ auth_session_id }}">
<button type="submit" name="action" value="approve">{{ messages.get("consent-approve") }}</button>
<button type="submit" name="action" value="deny">{{ messages.get("consent-deny") }}</button>
</form>
</body>
</html>
