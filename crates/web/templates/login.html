<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>{{ messages.get("login-title") }}</title></head>
<body>
<h1>{{ messages.get("login-title") }}</h1>
{% if let Some(key) = error_key %}<p class="error" role="alert">{{ messages.get(key) }}</p>{% endif %}
<form method="post" action="">
<input type="hidden" name="csrf_token" value="{{ csrf }}">
<label>{{ messages.get("login-username") }} <input type="text" name="username" autocomplete="username" required></label>
<label>{{ messages.get("login-password") }} <input type="password" name="password" autocomplete="current-password" required></label>
<button type="submit">{{ messages.get("login-submit") }}</button>
</form>
<p><a href="{{ tenant_prefix }}/forgot-password">{{ messages.get("login-forgot-password") }}</a></p>
<hr>
<p>{{ messages.get("login-passkey-or") }}</p>
<button type="button" id="btn-passkey-login">{{ messages.get("login-passkey-button") }}</button>
<div id="passkey-error" style="display:none">
  <p class="error" role="alert" id="passkey-error-msg"></p>
</div>
<script>
(function() {
  const btn = document.getElementById('btn-passkey-login');
  if (!window.PublicKeyCredential) {
    btn.disabled = true;
    btn.title = 'WebAuthn is not supported in this browser';
    return;
  }
  btn.addEventListener('click', async function() {
    document.getElementById('passkey-error').style.display = 'none';
    try {
      // 1. begin
      const beginRes = await fetch('{{ tenant_prefix }}/passkey/login/begin', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({})
      });
      if (!beginRes.ok) throw new Error('Server error (begin)');
      const { challenge_id, options } = await beginRes.json();

      // 2. Browser authenticator
      const fromB64 = s => Uint8Array.from(atob(s.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0));
      options.publicKey.challenge = fromB64(options.publicKey.challenge);
      if (options.publicKey.allowCredentials) {
        options.publicKey.allowCredentials = options.publicKey.allowCredentials.map(c => ({...c, id: fromB64(c.id)}));
      }
      const credential = await navigator.credentials.get(options);

      // 3. complete
      const toB64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
      const credJson = {
        id: credential.id,
        rawId: toB64(credential.rawId),
        type: credential.type,
        response: {
          authenticatorData: toB64(credential.response.authenticatorData),
          clientDataJSON: toB64(credential.response.clientDataJSON),
          signature: toB64(credential.response.signature),
        }
      };
      if (credential.response.userHandle) {
        credJson.response.userHandle = toB64(credential.response.userHandle);
      }

      const completeRes = await fetch('{{ tenant_prefix }}/passkey/login/complete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ challenge_id, credential: credJson })
      });
      if (!completeRes.ok) throw new Error('Server error (complete)');
      const result = await completeRes.json();
      if (result.redirect_to) {
        window.location.href = result.redirect_to;
      } else {
        throw new Error(result.error || 'Authentication failed');
      }
    } catch (e) {
      document.getElementById('passkey-error-msg').textContent = e.message;
      document.getElementById('passkey-error').style.display = '';
    }
  });
})();
</script>
{% include "react_bootstrap.html" %}
</body>
</html>
